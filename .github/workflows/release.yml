name: Release

on:
  release:
    types: [published]

jobs:
  # Derive the version once from the release tag; every publish job consumes it.
  # The committed package.json/jsr.json versions are 0.0.0 placeholders — the tag
  # is the single source of truth, so there's no manual version bump to remember.
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      dist-tag: ${{ steps.v.outputs.dist-tag }}
    steps:
      - id: v
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          # Prereleases (0.1.0-rc.N) publish under their prerelease id as the
          # dist-tag; stable versions go to `latest`.
          if [[ "$VERSION" == *-* ]]; then
            DIST_TAG="${VERSION#*-}"
            DIST_TAG="${DIST_TAG%%.*}"
          else
            DIST_TAG="latest"
          fi
          {
            echo "version=$VERSION"
            echo "dist-tag=$DIST_TAG"
          } >> "$GITHUB_OUTPUT"

  # Publish to the public npm registry via OIDC Trusted Publishing (no token, with provenance).
  npm:
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm Trusted Publishing (OIDC) + provenance
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.18.0
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @teamlunaris/easypoints-hydrogen run build

      # publishConfig.access is already "public"; prepublishOnly rebuilds dist.
      # Skip if this exact version is already on the registry so re-running a
      # partially-failed release doesn't 409 on the registries that succeeded.
      - name: Publish to npm
        working-directory: packages/easypoints-hydrogen
        env:
          VERSION: ${{ needs.version.outputs.version }}
          DIST_TAG: ${{ needs.version.outputs.dist-tag }}
        run: |
          if npm view "@teamlunaris/easypoints-hydrogen@$VERSION" version >/dev/null 2>&1; then
            echo "npm already has $VERSION; skipping."
            exit 0
          fi
          node -e "const fs=require('fs'),p=require('./package.json');p.version=process.env.VERSION;fs.writeFileSync('./package.json',JSON.stringify(p,null,2)+'\n')"
          npm publish --provenance --tag "$DIST_TAG"

  # Publish to GitHub Packages via the automatic GITHUB_TOKEN.
  github-packages:
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      # Writes an .npmrc scoping @teamlunaris to GitHub Packages, authed via NODE_AUTH_TOKEN.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.18.0
          registry-url: https://npm.pkg.github.com
          scope: "@teamlunaris"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @teamlunaris/easypoints-hydrogen run build

      # publishConfig.access is "public"; scope→registry mapping routes this to GH Packages.
      # Skip if this exact version already exists so re-running a partially-failed
      # release doesn't 409 (GitHub Packages refuses to overwrite a version).
      - name: Publish to GitHub Packages
        working-directory: packages/easypoints-hydrogen
        env:
          VERSION: ${{ needs.version.outputs.version }}
          DIST_TAG: ${{ needs.version.outputs.dist-tag }}
        run: |
          if npm view "@teamlunaris/easypoints-hydrogen@$VERSION" version --registry https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "GitHub Packages already has $VERSION; skipping."
            exit 0
          fi
          node -e "const fs=require('fs'),p=require('./package.json');p.version=process.env.VERSION;fs.writeFileSync('./package.json',JSON.stringify(p,null,2)+'\n')"
          pnpm publish --no-git-checks --tag "$DIST_TAG"

  # Publish to JSR (jsr.io) via OIDC Trusted Publishing (no token).
  # JSR publishes TypeScript source directly and generates the API reference from doc comments.
  #
  # We publish with `deno publish` directly rather than `npx jsr publish`: the jsr npm wrapper
  # force-adds `--unstable-byonm`, which resolves bare imports (including the JSX automatic-runtime
  # `react/jsx-runtime`) out of node_modules. Under pnpm, byonm walks up only to the package publish
  # root, so a hoisted `react` sits ABOVE that ceiling and `react/jsx-runtime` falls through to
  # sloppy-imports and resolves as a bogus relative path — the "Module not found .../react/jsx-runtime"
  # publish failure. deno-native publish instead honors jsr.json's `nodeModulesDir: "none"` + `imports`
  # map, resolving every dep straight from the npm registry, independent of node_modules/pnpm layout.
  jsr:
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for JSR OIDC publishing
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v2.x

      # jsr reads the version from jsr.json, so stamp it from the release tag. deno's
      # --set-version only asserts a matching config version during a real publish, so
      # writing the file is the reliable path. (node is preinstalled on GitHub runners.)
      #
      # --allow-slow-types: the public domain types are `v.InferOutput<typeof Schema>`,
      # so the schema values are transitively public and can't be explicitly annotated
      # without inverting that invariant. JSR still renders web docs from the doc comments;
      # npm consumers use the hand-built .d.mts from `vp pack`.
      #
      # --unstable-sloppy-imports: the source uses extensionless relative imports (matching
      # the vp/tsdown toolchain), which deno-native resolution otherwise rejects.
      #
      # --allow-dirty: the stamp step below edits jsr.json in place, which deno publish
      # otherwise rejects.
      - name: Publish to JSR
        working-directory: packages/easypoints-hydrogen
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          node -e "const fs=require('fs');const o=require('./jsr.json');o.version=process.env.VERSION;fs.writeFileSync('./jsr.json',JSON.stringify(o,null,2)+'\n')"
          deno publish --allow-slow-types --allow-dirty --unstable-sloppy-imports --no-check
