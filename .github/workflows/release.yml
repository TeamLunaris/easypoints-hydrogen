name: Release

on:
  release:
    types: [published]

jobs:
  # Publish to the public npm registry via OIDC Trusted Publishing (no token, with provenance).
  npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm Trusted Publishing (OIDC) + provenance
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.18.0
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @teamlunaris/easypoints-hydrogen run build

      # publishConfig.access is already "public"; prepublishOnly rebuilds dist.
      - run: npm publish --provenance
        working-directory: packages/easypoints-hydrogen

  # Publish to GitHub Packages via the automatic GITHUB_TOKEN.
  github-packages:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      # Writes an .npmrc scoping @teamlunaris to GitHub Packages, authed via NODE_AUTH_TOKEN.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.18.0
          registry-url: https://npm.pkg.github.com
          scope: '@teamlunaris'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @teamlunaris/easypoints-hydrogen run build

      # publishConfig.access is "public"; scope→registry mapping routes this to GH Packages.
      - run: pnpm publish --no-git-checks
        working-directory: packages/easypoints-hydrogen

  # Publish to JSR (jsr.io) via OIDC Trusted Publishing (no token).
  # JSR publishes TypeScript source directly and generates the API reference from doc comments.
  jsr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for JSR OIDC publishing
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.18.0
          cache: pnpm

      # npm deps + peer deps are read from package.json by `jsr publish`.
      - run: pnpm install --frozen-lockfile

      # --allow-slow-types: the public domain types are `v.InferOutput<typeof Schema>`,
      # so the schema values are transitively public and can't be explicitly annotated
      # without inverting that invariant. JSR still renders web docs from the doc comments;
      # npm consumers use the hand-built .d.mts from `vp pack`.
      - run: npx jsr publish --allow-slow-types
        working-directory: packages/easypoints-hydrogen
