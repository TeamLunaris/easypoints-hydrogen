name: Release

on:
  release:
    types: [published]

jobs:
  # Publish to the public npm registry via OIDC Trusted Publishing (no token, with provenance).
  npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm Trusted Publishing (OIDC) + provenance
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm

      # Trusted Publishing (OIDC) requires npm >= 11.5.1; Node 20 ships npm 10.
      - run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @teamlunaris/easypoints-hydrogen run build

      # publishConfig.access is already "public"; prepublishOnly rebuilds dist.
      - run: npm publish --provenance
        working-directory: packages/easypoints-hydrogen

  # Publish to GitHub Packages via the automatic GITHUB_TOKEN.
  github-packages:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      # Writes an .npmrc scoping @teamlunaris to GitHub Packages, authed via NODE_AUTH_TOKEN.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: '@teamlunaris'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @teamlunaris/easypoints-hydrogen run build

      # publishConfig.access is "public"; scope→registry mapping routes this to GH Packages.
      - run: pnpm publish --no-git-checks
        working-directory: packages/easypoints-hydrogen
