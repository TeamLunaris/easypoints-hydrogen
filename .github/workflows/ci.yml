name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Scope to the publishable library; the example app uses the Shopify CLI
      # (needs codegen/env) and is intentionally excluded from CI.

      # vp check: Oxlint + Oxfmt (format check) + type-aware checking
      - run: pnpm --filter @teamlunaris/easypoints-hydrogen run check

      # vp test: Vitest
      - run: pnpm --filter @teamlunaris/easypoints-hydrogen run test

      # vp pack: verifies the library bundle builds
      - run: pnpm --filter @teamlunaris/easypoints-hydrogen run build
